<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta name="description" content="Infinity — Premium Hoodies & Streetwear. Connect with us across all platforms." />
<meta name="theme-color" content="#0a0014" />
<title>Infinity — Premium Hoodies & Streetwear</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<!-- Premium Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
  /* ============================================
     RESET & ROOT
  ============================================ */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-deep: #050008;
    --bg-mid: #0a0014;
    --bg-soft: #12001f;

    --neon-purple: #9d4dff;
    --neon-purple-bright: #c77dff;
    --electric-blue: #4dd2ff;
    --gold: #ffd56b;
    --gold-soft: #f5c76a;

    --text-primary: #f5f0ff;
    --text-secondary: rgba(245, 240, 255, 0.65);
    --text-muted: rgba(245, 240, 255, 0.45);

    --glass-bg: rgba(20, 10, 35, 0.45);
    --glass-border: rgba(157, 77, 255, 0.18);

    --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
    overflow-y: auto;
  }

  /* ============================================
     ANIMATED BACKGROUND
  ============================================ */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: -3;
    overflow: hidden;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(157, 77, 255, 0.18), transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(77, 210, 255, 0.12), transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(255, 213, 107, 0.04), transparent 70%),
      linear-gradient(180deg, #050008 0%, #0a0014 50%, #050008 100%);
  }

  /* Animated gradient orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.6;
    will-change: transform;
  }

  .orb-1 {
    width: 480px;
    height: 480px;
    background: radial-gradient(circle, rgba(157, 77, 255, 0.55), transparent 70%);
    top: -150px;
    left: -150px;
    animation: orbFloat1 18s ease-in-out infinite;
  }

  .orb-2 {
    width: 520px;
    height: 520px;
    background: radial-gradient(circle, rgba(77, 210, 255, 0.4), transparent 70%);
    bottom: -180px;
    right: -180px;
    animation: orbFloat2 22s ease-in-out infinite;
  }

  .orb-3 {
    width: 360px;
    height: 360px;
    background: radial-gradient(circle, rgba(255, 213, 107, 0.18), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: orbFloat3 25s ease-in-out infinite;
  }
  
  @keyframes orbFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(120px, 80px) scale(1.15); }
    66% { transform: translate(60px, 160px) scale(0.9); }
  }

  @keyframes orbFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(-140px, -100px) scale(1.2); }
  }

  @keyframes orbFloat3 {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.3) rotate(180deg); }
  }

  /* Grid overlay */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(157, 77, 255, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(157, 77, 255, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
    animation: gridShift 30s linear infinite;
  }

  @keyframes gridShift {
    0% { background-position: 0 0, 0 0; }
    100% { background-position: 60px 60px, 60px 60px; }
  }

  /* Particles canvas */
  #particles {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
  }

  /* Noise texture for premium feel */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    opacity: 0.03;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ============================================
     PRELOADER
  ============================================ */
  .preloader {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg-deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    transition: opacity 0.9s var(--ease-smooth), visibility 0.9s var(--ease-smooth);
  }

  .preloader.hidden {
    opacity: 0;
    visibility: hidden;
  }

  .loader-logo {
    position: relative;
    width: 110px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loader-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid transparent;
    border-top-color: var(--neon-purple-bright);
    border-right-color: rgba(157, 77, 255, 0.35);
    animation: spin 1.4s linear infinite;
    box-shadow: 0 0 30px rgba(157, 77, 255, 0.45), inset 0 0 20px rgba(157, 77, 255, 0.15);
  }

  .loader-ring.inner {
    inset: 14px;
    border-top-color: var(--electric-blue);
    border-right-color: transparent;
    border-bottom-color: rgba(77, 210, 255, 0.3);
    animation: spin 1.8s linear infinite reverse;
    box-shadow: 0 0 20px rgba(77, 210, 255, 0.3);
  }

  .loader-symbol {
    font-family: 'Syncopate', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--neon-purple-bright), var(--electric-blue));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: pulse 1.8s ease-in-out infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.92); }
  }

  .loader-text {
    font-family: 'Syncopate', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #fff, var(--neon-purple-bright), var(--electric-blue), #fff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 3s linear infinite;
    padding-left: 0.5em;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .loader-progress {
    width: 200px;
    height: 2px;
    background: rgba(157, 77, 255, 0.15);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .loader-progress::after {
    content: '';
    position: absolute;
    inset: 0;
    width: 30%;
    background: linear-gradient(90deg, transparent, var(--neon-purple-bright), var(--electric-blue), transparent);
    border-radius: 2px;
    box-shadow: 0 0 12px var(--neon-purple-bright);
    animation: progressSlide 1.6s ease-in-out infinite;
  }

  @keyframes progressSlide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(366%); }
  }

  /* ============================================
     MAIN LAYOUT
  ============================================ */
  .app {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem;
    position: relative;
    opacity: 0;
    transform: scale(0.98);
    filter: blur(8px);
    transition: opacity 1s var(--ease-smooth) 0.2s, transform 1s var(--ease-smooth) 0.2s, filter 1s var(--ease-smooth) 0.2s;
  }

  .app.revealed {
    opacity: 1;
    transform: scale(1);
    filter: blur(0);
  }

  .container {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    justify-content: center;
  }

  /* ============================================
     CARD
  ============================================ */
  .card {
    width: 100%;
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid var(--glass-border);
    border-radius: 28px;
    padding: 2.5rem 1.75rem 2rem;
    position: relative;
    box-shadow:
      0 30px 80px -20px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(255, 255, 255, 0.03) inset,
      0 1px 0 rgba(255, 255, 255, 0.06) inset,
      0 0 60px -10px rgba(157, 77, 255, 0.18);
    overflow: hidden;
    will-change: transform;
    transition: transform 0.6s var(--ease-smooth);
  }

  /* Animated border glow */
  .card::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 30px;
    padding: 2px;
    background: conic-gradient(
      from 0deg,
      transparent 0%,
      rgba(157, 77, 255, 0.6) 25%,
      transparent 50%,
      rgba(77, 210, 255, 0.5) 75%,
      transparent 100%
    );
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.5;
    animation: borderRotate 8s linear infinite;
    pointer-events: none;
  }

  @keyframes borderRotate {
    to { transform: rotate(360deg); }
  }

  /* Top gold accent line */
  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.7;
  }

  /* ============================================
     LOGO
  ============================================ */
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1.25rem;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.9s var(--ease-smooth) 0.6s forwards;
  }

  .logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 30% 30%, #1a0a2e, #050008 70%);
    border: 1px solid rgba(157, 77, 255, 0.35);
    box-shadow:
      0 0 0 6px rgba(157, 77, 255, 0.05),
      0 0 40px rgba(157, 77, 255, 0.35),
      0 8px 30px rgba(0, 0, 0, 0.5),
      inset 0 0 20px rgba(157, 77, 255, 0.1);
    transition: transform 0.5s var(--ease-spring), box-shadow 0.5s var(--ease-smooth);
  }

  .logo:hover {
    transform: scale(1.05) rotate(8deg);
    box-shadow:
      0 0 0 8px rgba(157, 77, 255, 0.08),
      0 0 60px rgba(157, 77, 255, 0.6),
      0 0 100px rgba(77, 210, 255, 0.25),
      inset 0 0 30px rgba(157, 77, 255, 0.2);
  }

  .logo-symbol {
    font-family: 'Syncopate', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff 0%, var(--neon-purple-bright) 50%, var(--electric-blue) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(157, 77, 255, 0.5);
    letter-spacing: -0.05em;
  }

  .logo-orbit {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px dashed rgba(157, 77, 255, 0.25);
    animation: spin 20s linear infinite;
  }

  .logo-orbit::before {
    content: '';
    position: absolute;
    top: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 12px var(--gold);
  }

  /* ============================================
     BRAND
  ============================================ */
  .brand {
    text-align: center;
    margin-bottom: 1.75rem;
  }

  .brand-name {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(2rem, 8vw, 2.5rem);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    background: linear-gradient(180deg, #ffffff 0%, #d4c5ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 0.5rem;
    padding-left: 0.18em;
    line-height: 1.1;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.9s var(--ease-smooth) 0.75s forwards;
    position: relative;
  }

  .brand-name span {
    display: inline-block;
    background: linear-gradient(135deg, var(--neon-purple-bright), var(--electric-blue));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .brand-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin: 0.6rem 0;
    opacity: 0;
    animation: fadeUp 0.9s var(--ease-smooth) 0.85s forwards;
  }

  .brand-divider .line {
    width: 30px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }

  .brand-divider .line:last-child {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .brand-divider .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 10px var(--gold);
  }

  .brand-tagline {
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.9s var(--ease-smooth) 0.95s forwards;
  }

  /* ============================================
     SOCIAL LINKS
  ============================================ */
  .links {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
  }

  .link {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.95rem 1.25rem;
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 16px;
    color: var(--text-primary);
    text-decoration: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    position: relative;
    overflow: hidden;
    transition: all 0.4s var(--ease-smooth);
    cursor: pointer;
    opacity: 0;
    transform: translateY(20px);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    will-change: transform;
  }

  .link:nth-child(1) { animation: fadeUp 0.7s var(--ease-smooth) 1.05s forwards; }
  .link:nth-child(2) { animation: fadeUp 0.7s var(--ease-smooth) 1.15s forwards; }
  .link:nth-child(3) { animation: fadeUp 0.7s var(--ease-smooth) 1.25s forwards; }
  .link:nth-child(4) { animation: fadeUp 0.7s var(--ease-smooth) 1.35s forwards; }
  .link:nth-child(5) { animation: fadeUp 0.7s var(--ease-smooth) 1.45s forwards; }

  /* Shine sweep */
  .link::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.08),
      transparent
    );
    transition: left 0.7s var(--ease-smooth);
  }

  .link:hover::before {
    left: 100%;
  }

  /* Glow background on hover */
  .link::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--link-glow, linear-gradient(135deg, rgba(157, 77, 255, 0.15), rgba(77, 210, 255, 0.1)));
    opacity: 0;
    transition: opacity 0.4s var(--ease-smooth);
    z-index: -1;
  }

  .link:hover {
    transform: translateY(-3px);
    border-color: var(--link-border, rgba(157, 77, 255, 0.4));
    background: rgba(255, 255, 255, 0.04);
    box-shadow:
      0 12px 30px -10px var(--link-shadow, rgba(157, 77, 255, 0.45)),
      0 0 0 1px var(--link-border, rgba(157, 77, 255, 0.25)) inset;
  }

  .link:hover::after {
    opacity: 1;
  }

  .link:active {
    transform: translateY(-1px) scale(0.985);
    transition-duration: 0.15s;
  }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--icon-bg, rgba(157, 77, 255, 0.12));
    color: var(--icon-color, var(--neon-purple-bright));
    font-size: 1.1rem;
    flex-shrink: 0;
    transition: all 0.4s var(--ease-spring);
    position: relative;
  }

  .link:hover .link-icon {
    transform: scale(1.1) rotate(-6deg);
    background: var(--icon-bg-hover, rgba(157, 77, 255, 0.25));
    box-shadow: 0 0 20px var(--link-shadow, rgba(157, 77, 255, 0.5));
  }

  .link-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
    min-width: 0;
  }

  .link-label {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
  }

  .link-handle {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .link-arrow {
    color: var(--text-muted);
    font-size: 0.85rem;
    transition: all 0.4s var(--ease-smooth);
    flex-shrink: 0;
  }

  .link:hover .link-arrow {
    color: var(--icon-color, var(--neon-purple-bright));
    transform: translateX(4px);
  }

  /* Per-platform colors */
  .link.facebook {
    --icon-color: #4d8eff;
    --icon-bg: rgba(77, 142, 255, 0.12);
    --icon-bg-hover: rgba(77, 142, 255, 0.25);
    --link-border: rgba(77, 142, 255, 0.4);
    --link-shadow: rgba(77, 142, 255, 0.45);
    --link-glow: linear-gradient(135deg, rgba(77, 142, 255, 0.15), rgba(77, 210, 255, 0.08));
  }

  .link.instagram {
    --icon-color: #ff6ec7;
    --icon-bg: linear-gradient(135deg, rgba(255, 110, 199, 0.15), rgba(255, 165, 100, 0.12));
    --icon-bg-hover: linear-gradient(135deg, rgba(255, 110, 199, 0.3), rgba(255, 165, 100, 0.25));
    --link-border: rgba(255, 110, 199, 0.4);
    --link-shadow: rgba(255, 110, 199, 0.45);
    --link-glow: linear-gradient(135deg, rgba(255, 110, 199, 0.15), rgba(255, 165, 100, 0.1));
  }

  .link.tiktok {
    --icon-color: #ffffff;
    --icon-bg: rgba(255, 255, 255, 0.08);
    --icon-bg-hover: rgba(255, 255, 255, 0.18);
    --link-border: rgba(255, 255, 255, 0.3);
    --link-shadow: rgba(0, 240, 200, 0.45);
    --link-glow: linear-gradient(135deg, rgba(255, 0, 80, 0.12), rgba(0, 240, 200, 0.12));
  }

  .link.whatsapp {
    --icon-color: #25d366;
    --icon-bg: rgba(37, 211, 102, 0.12);
    --icon-bg-hover: rgba(37, 211, 102, 0.25);
    --link-border: rgba(37, 211, 102, 0.4);
    --link-shadow: rgba(37, 211, 102, 0.45);
    --link-glow: linear-gradient(135deg, rgba(37, 211, 102, 0.15), rgba(37, 211, 102, 0.05));
  }

  .link.store {
    --icon-color: var(--gold);
    --icon-bg: rgba(255, 213, 107, 0.12);
    --icon-bg-hover: rgba(255, 213, 107, 0.22);
    --link-border: rgba(255, 213, 107, 0.45);
    --link-shadow: rgba(255, 213, 107, 0.4);
    --link-glow: linear-gradient(135deg, rgba(255, 213, 107, 0.18), rgba(157, 77, 255, 0.08));
  }

  .link.store {
    background: linear-gradient(135deg, rgba(255, 213, 107, 0.06), rgba(157, 77, 255, 0.06));
    border-color: rgba(255, 213, 107, 0.18);
  }

  .link.store .link-label {
    background: linear-gradient(135deg, var(--gold), #fff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .link-badge {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--gold), var(--gold-soft));
    color: #1a0a2e;
    text-transform: uppercase;
    margin-right: 0.4rem;
    box-shadow: 0 2px 10px rgba(255, 213, 107, 0.35);
  }

  /* ============================================
     FOOTER
  ============================================ */
  .footer {
    margin-top: 2rem;
    padding: 1rem 0;
    text-align: center;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.9s var(--ease-smooth) 1.7s forwards;
  }

  .footer-symbol {
    color: var(--neon-purple-bright);
    margin: 0 0.3em;
    text-shadow: 0 0 8px rgba(157, 77, 255, 0.6);
  }

  /* ============================================
     ANIMATIONS
  ============================================ */
  @keyframes fadeUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ============================================
     RESPONSIVE
  ============================================ */
  @media (max-width: 480px) {
    .app {
      padding: 1.5rem 1rem;
    }
    .card {
      padding: 2rem 1.25rem 1.5rem;
      border-radius: 24px;

    .logo {
      width: 88px;

    .brand-name {

    .brand-tagline {

    .link {
      padding: 0.85rem 1rem;

    .link-icon {
      width: 38px;

    .link-label {

    }
    .link-handle {
      font-size: 0.68rem;
    }
    .loader-text {
      font-size: 1.2rem;
      letter-spacing: 0.4em;
    }
    .orb-1, .orb-2 {
      width: 320px;
      height: 320px;
    }
  }

  @media (min-width: 768px) {
    .container {
      max-width: 460px;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.2s !important;
    }
  }
  
  .logo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 50%;
}

.loader-img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}
</style>
</head>
<body>

<!-- Animated Background -->
<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

<div class="grid-overlay"></div>
<canvas id="particles" aria-hidden="true"></canvas>

<!-- Preloader -->
<div class="preloader" id="preloader" role="status" aria-label="Loading Infinity">
  <div class="loader-logo">
    <div class="loader-ring"></div>
    <div class="loader-ring inner"></div>
    <img src="https://www.image2url.com/r2/default/images/1777175953021-7a96f9f6-cc1c-45ae-aa0e-a0b26e59690b.png" class="loader-img" alt="Infinity Logo">
  </div>
  <div class="loader-text">Infinity</div>
  <div class="loader-progress"></div>
</div>

<!-- Main App -->
<main class="app" id="app">
  <div class="container">

    <!-- Card -->
    <section class="card" id="card" aria-label="Infinity brand card">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo">
          <div class="logo-orbit"></div>
          <img src="https://www.image2url.com/r2/default/images/1777175953021-7a96f9f6-cc1c-45ae-aa0e-a0b26e59690b.png" alt="Infinity Logo" class="logo-img">
        </div>
      </div>

      <!-- Brand -->
      <header class="brand">
        <h1 class="brand-name">Infi<span>nity</span></h1>
        <div class="brand-divider" aria-hidden="true">
          <span class="line"></span>
          <span class="dot"></span>

        </div>
        <p class="brand-tagline">Premium Hoodies &amp; Streetwear</p>
      </header>

      <!-- Links -->
      <nav class="links" aria-label="Social and store links">

        <a href="FACEBOOK_LINK_HERE" class="link facebook" target="_blank" rel="noopener noreferrer">
          <span class="link-icon"><i class="fa-brands fa-facebook-f"></i></span>

        </a>

        <a href="INSTAGRAM_LINK_HERE" class="link instagram" target="_blank" rel="noopener noreferrer">
          <span class="link-icon"><i class="fa-brands fa-instagram"></i></span>
          <span class="link-text">

            <span class="link-handle">@infinity</span>
          </span>

        <a href="TIKTOK_LINK_HERE" class="link tiktok" target="_blank" rel="noopener noreferrer">
          <span class="link-icon"><i class="fa-brands fa-tiktok"></i></span>
          <span class="link-text">
            <span class="link-label">TikTok</span>
            <span class="link-handle">@infinity</span>
          </span>
          <i class="fa-solid fa-arrow-right link-arrow" aria-hidden="true"></i>
        </a>

        <a href="WHATSAPP_LINK_HERE" class="link whatsapp" target="_blank" rel="noopener noreferrer">
          <span class="link-icon"><i class="fa-brands fa-whatsapp"></i></span>

        <a href="STORE_LINK_HERE" class="link store" target="_blank" rel="noopener noreferrer">
          <span class="link-icon"><i class="fa-solid fa-bag-shopping"></i></span>

            <span class="link-label">Shop the Collection</span>
            <span class="link-handle">infinity.store — Official</span>

    <!-- Footer -->
    <footer class="footer">
      &copy; 2026 Infinity <span class="footer-symbol">∞</span> All rights reserved.
    </footer>

  </div>
</main>

<script>
  /* ============================================
     PRELOADER HANDLING
  ============================================ */
  (function () {
    const preloader = document.getElementById('preloader');
    const app = document.getElementById('app');
    const MIN_DURATION = 1600;
    const startTime = performance.now();

    function reveal() {
      const elapsed = performance.now() - startTime;
      const wait = Math.max(0, MIN_DURATION - elapsed);
      setTimeout(() => {
        preloader.classList.add('hidden');
        app.classList.add('revealed');
        setTimeout(() => {
          if (preloader.parentNode) preloader.parentNode.removeChild(preloader);
        }, 1000);
      }, wait);
    }

    if (document.readyState === 'complete') {
      reveal();
    } else {
      window.addEventListener('load', reveal);
    }
  })();

  /* ============================================
     PARTICLES BACKGROUND
  ============================================ */
  (function () {
    const canvas = document.getElementById('particles');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let width, height, particles = [];
    let mouse = { x: -9999, y: -9999 };
    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * DPR;
      canvas.height = height * DPR;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      initParticles();
    }

    function initParticles() {
      const area = width * height;
      const count = Math.min(80, Math.floor(area / 18000));
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          r: Math.random() * 1.6 + 0.3,
          hue: Math.random() < 0.7 ? 270 : 200, // purple or blue
          alpha: Math.random() * 0.5 + 0.2
        });
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      // Update + draw particles
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        // Mouse repulsion
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist2 = dx * dx + dy * dy;
        if (dist2 < 14400) {
          const dist = Math.sqrt(dist2);
          const force = (120 - dist) / 120 * 0.6;
          p.vx += (dx / dist) * force * 0.04;
          p.vy += (dy / dist) * force * 0.04;
        }

        p.x += p.vx;
        p.y += p.vy;

        // Friction
        p.vx *= 0.99;
        p.vy *= 0.99;

        // Wrap edges
        if (p.x < -10) p.x = width + 10;
        if (p.x > width + 10) p.x = -10;
        if (p.y < -10) p.y = height + 10;
        if (p.y > height + 10) p.y = -10;

        // Draw
        ctx.beginPath();
        ctx.fillStyle = `hsla(${p.hue}, 90%, 70%, ${p.alpha})`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `hsla(${p.hue}, 90%, 65%, 0.8)`;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;

      // Draw connecting lines
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i];
          const b = particles[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const dist2 = dx * dx + dy * dy;
          if (dist2 < 12000) {
            const opacity = (1 - dist2 / 12000) * 0.18;
            ctx.strokeStyle = `rgba(157, 77, 255, ${opacity})`;
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', () => {
      mouse.x = -9999;
      mouse.y = -9999;
    });
    window.addEventListener('touchmove', (e) => {
      if (e.touches[0]) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    }, { passive: true });

    resize();
    draw();
  })();

  /* ============================================
     PARALLAX TILT ON CARD (DESKTOP)
  ============================================ */
  (function () {
    const card = document.getElementById('card');
    if (!card) return;
    if (window.matchMedia('(hover: none)').matches) return;

    const MAX_TILT = 5;
    let rafId = null;
    let targetX = 0, targetY = 0;
    let currentX = 0, currentY = 0;

    function update() {
      currentX += (targetX - currentX) * 0.08;
      currentY += (targetY - currentY) * 0.08;
      card.style.transform = `perspective(1200px) rotateX(${currentY}deg) rotateY(${currentX}deg)`;
      if (Math.abs(targetX - currentX) > 0.01 || Math.abs(targetY - currentY) > 0.01) {
        rafId = requestAnimationFrame(update);
      } else {
        rafId = null;
      }
    }

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      targetX = x * MAX_TILT;
      targetY = -y * MAX_TILT;
      if (!rafId) rafId = requestAnimationFrame(update);
    });

    card.addEventListener('mouseleave', () => {
      targetX = 0;
      targetY = 0;
      if (!rafId) rafId = requestAnimationFrame(update);
    });
  })();

  /* ============================================
     LINK RIPPLE EFFECT
  ============================================ */
  (function () {
    const links = document.querySelectorAll('.link');
    links.forEach(link => {
      link.addEventListener('click', function (e) {
        // Don't block actual navigation, just visual feedback
        const rect = this.getBoundingClientRect();
        const ripple = document.createElement('span');
        const size = Math.max(rect.width, rect.height);
        ripple.style.cssText = `
          position: absolute;
          width: ${size}px;
          height: ${size}px;
          left: ${e.clientX - rect.left - size / 2}px;
          top: ${e.clientY - rect.top - size / 2}px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(255,255,255,0.3), transparent 70%);
          transform: scale(0);
          animation: rippleAnim 0.7s ease-out;
          pointer-events: none;
          z-index: 1;
        `;
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      });
    });

    // Inject keyframes for ripple
    const style = document.createElement('style');
    style.textContent = `
      @keyframes rippleAnim {
        to { transform: scale(2.5); opacity: 0; }
      }
    `;
    document.head.appendChild(style);
  })();
</script>
</body>
